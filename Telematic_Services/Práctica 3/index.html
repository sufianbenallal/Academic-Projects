    <!----------------------------script para pasar los datos de config.html---------------------------------->
    <script>

     const enlaceGoogleMaps = urlParams.get("enlaceGoogleMaps");
const enlaceGoogleMapsElement = document.getElementById("url");

if (enlaceGoogleMaps) {
    enlaceGoogleMapsElement.innerHTML = `<a href="${enlaceGoogleMaps}" target="_blank">Ver en mapa</a>`;
} else {
    enlaceGoogleMapsElement.textContent = "";
}
  </script>
