    <!-------------------------------Script de Jquery para las imagenes 1----------------------------------->
        <script>
            let timeout;
            $(document).ready(function() {
                $('.imagen').hover(function() {
                    const nombreImagen = $(this).data('nombre');
                    const rutaImagen = $(this).find('img').attr('src');
                    const contenidoHTML = `<div><img src="${rutaImagen}" alt="${nombreImagen}" style="max-width: 500px; max-height: 500px;"><p>${nombreImagen}</p></div>`;
                    clearTimeout(timeout);
                    $('#info-imagen').html(contenidoHTML).css('display', 'flex');
                }, function() {
                    timeout = setTimeout(() => {
                        $('#info-imagen').css('display', 'none');
                    }, 0); // Sin tiempo de espera antes de ocultar la información
                });
            });
          </script>

        <button id="anterior">&lt;</button>
        <button id="siguiente">&gt;</button>
    </div>
    <script>
        const carrusel = $('.carrusel');
        const anchoImagen = 220; // Ajusta según el ancho de tus imágenes
        let posicion = 0;

        $('#anterior').on('click', function() {
            if (posicion > 0) {
                posicion -= anchoImagen;
                carrusel.css('transform', `translateX(${-posicion}px)`);
            }
        });

        $('#siguiente').on('click', function() {
            const limite = (carrusel.children().length - 3) * anchoImagen; // Muestra 3 imágenes a la vez
            if (posicion < limite) {
                posicion += anchoImagen;
                carrusel.css('transform', `translateX(${-posicion}px)`);
            }
        });
    </script>
