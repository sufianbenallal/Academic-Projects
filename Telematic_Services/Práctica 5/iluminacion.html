{% extends "layout.html" %}
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

{% block head %}
    <title>Iluminación</title>
{% endblock %}

{% block body %}
    {% if session.logged_in %}
        <div id="actuadores">
            <h2>Iluminación</h2>

            <script type="text/javascript">
                // Agrega esta función para manejar el envío del color
                function enviarColor() {
                    var colorSeleccionado = document.getElementById('colorLight').value;

                    // Realiza una solicitud AJAX para enviar el color al servidor
                    $.ajax({
                        type: "GET",
                        url: "/setcolor",
                        contentType: "application/json; charset=utf-8",
                        data: {
                          red: parseInt(colorSeleccionado.substring(1, 3).padStart(2, '0'), 16),
                          green: parseInt(colorSeleccionado.substring(3, 5).padStart(2, '0'), 16),
                          blue: parseInt(colorSeleccionado.substring(5, 7).padStart(2, '0'), 16)

                        },
                        success: function (data) {
                            // Actualiza el resultado en el elemento con id 'result'
                            $('#result').text(data.message);
                        },
                        error: function (error) {
                            console.error('Error al enviar el color:', error);
                        }
                    });
                }
            </script>

            <div id="result"></div>
            <input type="color" id="colorLight" name="colorLight" value="#0000ff">
            <button class="button" type="button" onclick="enviarColor()">Envía color</button>
        </div>
    {% endif %}
{% endblock %}
